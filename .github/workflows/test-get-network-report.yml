name: test - get-network-report

on:
  pull_request:
    branches:
      - main
    paths:
      - get-network-report/**
      - create-cluster/**
      - update-network/**
      - remove-cluster/**
      - .github/workflows/test-get-network-report.yml

concurrency:
  group: test-get-network-report-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            **/package-lock.json

      - name: build
        run: make package-get-network-report package-create-cluster package-update-network

      - name: create-cluster
        id: create-cluster
        uses: ./create-cluster
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          kubernetes-distribution: kind
          timeout-minutes: 5

      - name: enable report collection
        uses: ./update-network
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          network-id: ${{ steps.create-cluster.outputs.network-id }}
          collect-report: "true"

      - name: get network report events (variable)
        id: events-var
        uses: ./get-network-report
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          network-id: ${{ steps.create-cluster.outputs.network-id }}
          mode: events

      - name: get network report events (file)
        uses: ./get-network-report
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          network-id: ${{ steps.create-cluster.outputs.network-id }}
          mode: events
          events-file-path: ./network-events.json

      - name: remove cluster
        id: remove-cluster
        uses: replicatedhq/replicated-actions/remove-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}

      # Summary becomes available only after the network is terminated and events
      # have been processed. Wait briefly, then attempt the call. Marked
      # continue-on-error because event processing time is non-deterministic.
      - name: wait for summary processing
        run: sleep 60

      - name: get network report summary (variable)
        continue-on-error: true
        uses: ./get-network-report
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          network-id: ${{ steps.create-cluster.outputs.network-id }}
          mode: summary

      - name: cleanup cluster on failure
        if: failure() && steps.remove-cluster.conclusion != 'success'
        uses: replicatedhq/replicated-actions/remove-cluster@v1
        continue-on-error: true
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}
