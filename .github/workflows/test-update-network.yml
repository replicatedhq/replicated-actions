name: test - update-network

on:
  pull_request:
    branches:
      - main
    paths:
      - update-network/**
      - create-cluster/**
      - remove-cluster/**
      - .github/workflows/test-update-network.yml

concurrency:
  group: test-update-network-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            **/package-lock.json

      - name: build
        run: make package-update-network package-create-cluster

      - name: create-cluster
        id: create-cluster
        uses: ./create-cluster
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          kubernetes-distribution: kind
          timeout-minutes: 5

      - name: test update-network
        id: update-network
        uses: ./update-network
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          network-id: ${{ steps.create-cluster.outputs.network-id }}
          policy: airgap
          collect-report: "true"

      - name: remove cluster
        if: always()
        uses: replicatedhq/replicated-actions/remove-cluster@v1
        continue-on-error: true # It could be that the cluster is already removed
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}
