name: "Create VM"
description: "Create VM"
inputs:
  api-token:
    description: "API Token."
    required: true
  distribution:
    description: "VM distribution to provision (e.g., ubuntu)."
    required: true
  version:
    description: "Distribution version to provision."
    required: false
  vm-name:
    description: "Name of the VM to provision."
    required: false
  ttl:
    description: "VM TTL (duration, max 48h)"
    required: false
  disk:
    description: "Disk size in GiB"
    required: false
  instance-type:
    description: "Instance type to provision"
    required: false
  count:
    description: "Number of VMs to provision"
    required: false
  public-keys:
    description: |
      SSH public keys to inject into the VM.
      Example:
      <pre>public-keys: \|
        - "ssh-ed25519 AAAA... user@host"</pre>
    required: false
  tags:
    description: |
      Tags to assign to the VM.
      Example:
      <pre>tags: \|
        - key: "department"
          value: "engineering"</pre>
    required: false
  timeout-minutes:
    description: "Time to wait for the VM(s) to have a status of `running`"
    required: false
    default: "20"
outputs:
  vm-id: # first VM's id
    description: "Contains the first VM's id (convenient for count=1)."
  vm-ids: # all VM ids
    description: "JSON array of all created VM ids."
  vm-status: # first VM's final status
    description: "Final status of the first VM after polling."
  network-id: # network id of the first VM
    description: "Contains the network id associated with the first VM."
runs:
  using: "node24"
  main: "index.js"
